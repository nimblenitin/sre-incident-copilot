apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093
    rule_files:
      - /etc/prometheus/alert.rules.yml
    scrape_configs:
      - job_name: 'inference-api'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: inference-api
            action: keep
          - source_labels: [__address__]
            action: replace
            regex: ([^:]+)(?::\d+)?
            replacement: $1:8000
            target_label: __address__
      - job_name: 'inference-api-static'
        static_configs:
          - targets: ['inference-api:8000']
      - job_name: 'sre-co-pilot-metrics'
        static_configs:
          - targets: ['host.docker.internal:9100']
  alert.rules.yml: |
    groups:
      - name: inference-api
        rules:
          - alert: InferenceHighLatency
            expr: histogram_quantile(0.99, rate(inference_latency_seconds_bucket[2m])) > 1.5
            for: 1m
            labels:
              severity: critical
              service: inference-api
            annotations:
              summary: "Inference API p99 latency > 1.5s"
              description: "p99 inference latency is {{ $value }}s"
              runbook: "high-latency"
          - alert: InferenceErrorRateHigh
            expr: rate(inference_errors_total[5m]) / rate(inference_requests_total[5m]) > 0.05
            for: 2m
            labels:
              severity: warning
              service: inference-api
            annotations:
              summary: "Inference API error rate > 5%"
              description: "Error rate is {{ $value | humanizePercentage }}"
              runbook: "inference-api-errors"
          - alert: InferenceHighInFlight
            expr: inference_requests_in_flight > 10
            for: 1m
            labels:
              severity: warning
              service: inference-api
            annotations:
              summary: "Inference API high in-flight requests"
              description: "In-flight requests: {{ $value }}"
              runbook: "high-latency"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.console.libraries=/usr/share/prometheus/console_libraries"
            - "--web.console.templates=/usr/share/prometheus/consoles"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30090
  type: NodePort
